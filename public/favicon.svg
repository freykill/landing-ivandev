<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ivan Diaz">
  <!-- tile: morado plano de la landing (#7c5cfc), sin gradiente -->
  <rect width="512" height="512" rx="112" fill="#7c5cfc"/>
  <!-- borde hairline, como las cards de la landing (border-white/8) -->
  <rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="3"/>
  <!-- "I" slab-serif = inicial de Ivan + cursor de texto de terminal -->
  <g fill="#ffffff">
    <rect x="156" y="146" width="200" height="52" rx="10"/>
    <rect x="211" y="146" width="90"  height="220"/>
    <rect x="156" y="314" width="200" height="52" rx="10"/>
  </g>
</svg>
