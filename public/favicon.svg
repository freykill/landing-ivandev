<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="94" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>
  
  <!-- Corner glow -->
  <circle cx="80" cy="80" r="120" fill="url(#glow)" opacity="0.5"/>
  
  <!-- Terminal bracket < -->
  <path d="M 170 168 L 80 256 L 170 344" 
        fill="none" stroke="url(#accent)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>
  
  <!-- Terminal bracket > -->
  <path d="M 342 168 L 432 256 L 342 344" 
        fill="none" stroke="url(#accent)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>
  
  <!-- Slash / in the middle -->
  <path d="M 280 148 L 232 364" 
        fill="none" stroke="#e2e8f0" stroke-width="32" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Cursor blink dot -->
  <circle cx="420" cy="400" r="14" fill="#22c55e" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
